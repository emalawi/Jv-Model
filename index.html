<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gini AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #e8e4f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 860px;
            background: #f0eef6;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(80,40,140,0.18);
            border-radius: 36px;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #6a3db8 0%, #7c4dcc 100%);
            padding: 18px 20px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .header-back { color: #fff; font-size: 1.3rem; font-weight: 600; cursor: pointer; opacity: 0.9; }
        .header-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; border: 2px solid rgba(255,255,255,0.4); flex-shrink: 0;
        }
        .header-title { flex-grow: 1; color: #fff; font-size: 1.05rem; font-weight: 700; }
        .header-icons { display: flex; gap: 14px; color: rgba(255,255,255,0.9); font-size: 1rem; }
        .header-icons span { cursor: pointer; }

        /* CHAT BOX */
        .chat-box {
            flex-grow: 1; overflow-y: auto;
            padding: 20px 16px 10px;
            display: flex; flex-direction: column; gap: 14px;
            scroll-behavior: smooth;
        }
        .chat-box::-webkit-scrollbar { width: 3px; }
        .chat-box::-webkit-scrollbar-thumb { background: #c4b5e8; border-radius: 3px; }

        /* WELCOME SCREEN */
        #welcomeScreen { display: flex; flex-direction: column; gap: 16px; }

        .ai-greeting { display: flex; align-items: flex-start; gap: 10px; }
        .ai-greeting-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            background: linear-gradient(135deg, #a78bfa, #6a3db8);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; flex-shrink: 0; border: 2px solid #d8ccf5;
        }
        .ai-greeting-bubble {
            background: #fff; border-radius: 4px 18px 18px 18px;
            padding: 14px 16px; box-shadow: 0 2px 8px rgba(100,60,180,0.08); max-width: 80%;
        }
        .ai-greeting-bubble strong { display: block; font-size: 0.95rem; color: #2d1b69; margin-bottom: 4px; }
        .ai-greeting-bubble p { font-size: 0.85rem; color: #555; line-height: 1.5; }

        .capabilities-card {
            background: linear-gradient(135deg, #eef3ff 0%, #f0eaff 100%);
            border-radius: 16px; padding: 16px; border: 1px solid #ddd5f5;
        }
        .capabilities-title {
            font-size: 0.85rem; font-weight: 700; color: #3d2080;
            margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
        }
        .capability-item {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 9px; font-size: 0.82rem; color: #444;
        }
        .capability-item:last-child { margin-bottom: 0; }
        .check-icon {
            width: 18px; height: 18px; border-radius: 50%; background: #6a3db8;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 0.6rem; color: #fff;
        }
        .capability-item.highlight { color: #6a3db8; font-weight: 600; }

        .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .quick-btn {
            background: #fff; border: 1.5px solid #e0d8f5; border-radius: 14px;
            padding: 12px 14px; display: flex; align-items: center; gap: 8px;
            cursor: pointer; font-size: 0.8rem; font-weight: 600; color: #2d1b69;
            transition: all 0.15s ease; font-family: inherit; text-align: left;
        }
        .quick-btn:hover {
            background: #f3eeff; border-color: #a78bfa;
            transform: translateY(-1px); box-shadow: 0 4px 12px rgba(106,61,184,0.12);
        }
        .quick-btn-icon {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0;
        }
        .icon-blue   { background: #e8f0ff; }
        .icon-pink   { background: #fff0f5; }
        .icon-green  { background: #edfff5; }
        .icon-purple { background: #f3eeff; }

        /* MESSAGES */
        .message { display: flex; flex-direction: column; animation: fadeUp 0.25s ease; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .user-message { align-items: flex-end; }
        .user-bubble {
            background: linear-gradient(135deg, #7c4dcc, #6a3db8);
            color: #fff; border-radius: 18px 18px 4px 18px;
            padding: 10px 14px; max-width: 78%;
            font-size: 0.85rem; line-height: 1.5; word-break: break-word;
        }

        .ai-message { align-items: flex-start; }
        .ai-row { display: flex; align-items: flex-start; gap: 8px; width: 100%; }
        .ai-msg-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #a78bfa, #6a3db8);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; flex-shrink: 0; border: 1.5px solid #d8ccf5; margin-top: 2px;
        }
        .ai-bubble-wrap { flex: 1; min-width: 0; }
        .ai-bubble {
            background: #fff; border-radius: 4px 18px 18px 18px;
            padding: 12px 14px; font-size: 0.85rem; line-height: 1.6;
            color: #2d1b69; word-break: break-word; white-space: pre-wrap;
            box-shadow: 0 2px 8px rgba(100,60,180,0.07);
        }
        .ai-bubble pre {
            background: #f5f0ff; border: 1px solid #d8ccf5;
            border-left: 3px solid #7c4dcc; border-radius: 8px;
            padding: 10px 12px; margin: 8px 0; overflow-x: auto;
            white-space: pre; font-size: 0.78rem;
            font-family: 'Courier New', monospace; color: #2d1b69;
        }
        .ai-meta {
            display: flex; align-items: center;
            justify-content: space-between; margin-top: 6px; padding: 0 2px;
        }
        .ai-time { font-size: 0.68rem; color: #999; }
        .copy-btn {
            background: none; border: 1px solid #ddd5f5; color: #888;
            font-family: inherit; font-size: 0.68rem; padding: 2px 8px;
            border-radius: 20px; cursor: pointer; transition: all 0.15s;
        }
        .copy-btn:hover { background: #f3eeff; color: #6a3db8; border-color: #a78bfa; }
        .copy-btn.copied { color: #6a3db8; border-color: #6a3db8; }

        /* THINKING DOTS */
        .thinking-bubble {
            background: #fff; border-radius: 4px 18px 18px 18px;
            padding: 14px 18px; display: flex; align-items: center; gap: 5px;
            box-shadow: 0 2px 8px rgba(100,60,180,0.07);
        }
        .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #a78bfa; animation: dotBounce 1.2s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
            40% { transform: translateY(-5px); opacity: 1; }
        }

        /* TYPING CURSOR */
        .typing-cursor::after {
            content: '|'; color: #7c4dcc;
            animation: blink 0.6s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ERROR */
        .error-bubble {
            background: #fff5f5; border: 1px solid #fdd;
            border-radius: 12px; padding: 10px 14px;
            font-size: 0.82rem; color: #c0392b;
        }

        /* INPUT AREA */
        .input-area {
            background: #fff; padding: 12px 14px 20px;
            border-top: 1px solid #ede8f8;
            display: flex; align-items: center; gap: 10px; flex-shrink: 0;
        }
        .mic-btn {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, #7c4dcc, #6a3db8);
            border: none; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: 1rem; flex-shrink: 0;
        }
        .input-wrap {
            flex-grow: 1; background: #f5f2fc; border-radius: 24px;
            display: flex; align-items: center; padding: 0 14px;
            border: 1.5px solid #e0d8f5; transition: border-color 0.15s;
        }
        .input-wrap:focus-within { border-color: #a78bfa; }
        #promptInput {
            flex-grow: 1; background: none; border: none; outline: none;
            font-family: 'Inter', sans-serif; font-size: 0.85rem;
            color: #2d1b69; padding: 11px 0;
        }
        #promptInput::placeholder { color: #b0a0d0; }
        .attach-btn {
            background: none; border: none; cursor: pointer;
            color: #b0a0d0; font-size: 1rem; padding: 4px;
        }
        .send-btn {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, #7c4dcc, #6a3db8);
            border: none; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: 1rem; flex-shrink: 0;
            transition: opacity 0.15s, transform 0.1s;
        }
        .send-btn:hover { opacity: 0.88; }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        @media (max-width: 480px) {
            body { background: #f0eef6; align-items: flex-start; }
            .phone { max-width: 100%; height: 100vh; max-height: 100vh; border-radius: 0; box-shadow: none; }
        }
    </style>
</head>
<body>
<div class="phone">

    <div class="header">
        <span class="header-back">&#8249;</span>
        <div class="header-avatar">🤖</div>
        <span class="header-title">Gini AI</span>
        <div class="header-icons">
            <span>⚙</span>
            <span>☰</span>
        </div>
    </div>

    <div class="chat-box" id="chatBox">
        <div id="welcomeScreen">

            <div class="ai-greeting">
                <div class="ai-greeting-avatar">🤖</div>
                <div class="ai-greeting-bubble">
                    <strong>Hello! I'm Gini AI.</strong>
                    <p>Here to assist you with any questions you have.</p>
                </div>
            </div>

            <div class="capabilities-card">
                <div class="capabilities-title">💡 How I Can Assist You:</div>
                <div class="capability-item">
                    <div class="check-icon">✓</div>
                    Answer your questions accurately.
                </div>
                <div class="capability-item">
                    <div class="check-icon">✓</div>
                    Provide insights and solutions.
                </div>
                <div class="capability-item">
                    <div class="check-icon">✓</div>
                    Help with tasks and research.
                </div>
                <div class="capability-item highlight">
                    <div class="check-icon">✓</div>
                    Available 24/7 to assist you!
                </div>
            </div>

            <div class="quick-actions">
                <button class="quick-btn" onclick="quickPrompt('Ask a question')">
                    <div class="quick-btn-icon icon-blue">❓</div>Ask a question
                </button>
                <button class="quick-btn" onclick="quickPrompt('Get insights')">
                    <div class="quick-btn-icon icon-pink">📊</div>Get insights
                </button>
                <button class="quick-btn" onclick="quickPrompt('Help with tasks')">
                    <div class="quick-btn-icon icon-green">📋</div>Help with tasks
                </button>
                <button class="quick-btn" onclick="quickPrompt('Do some research')">
                    <div class="quick-btn-icon icon-purple">🔍</div>Do some research
                </button>
            </div>

        </div>
    </div>

    <div class="input-area">
        <button class="mic-btn">🎤</button>
        <div class="input-wrap">
            <input type="text" id="promptInput" placeholder="Type your message...">
            <button class="attach-btn">📎</button>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

</div>

<script>
    const API_URL = "https://emalawi19-js-coder-backend.hf.space/generate";

    function escapeHTML(str) {
        return str
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function formatReply(text) {
        const parts = text.split(/(```[\s\S]*?```)/g);
        return parts.map(part => {
            if (part.startsWith('```') && part.endsWith('```')) {
                const inner = part.slice(3, -3);
                const nl = inner.indexOf('\n');
                const code = nl !== -1 ? inner.slice(nl + 1) : inner;
                return `<pre>${escapeHTML(code)}</pre>`;
            }
            return escapeHTML(part);
        }).join('');
    }

    function chatBox()      { return document.getElementById('chatBox'); }
    function scrollBottom() { const cb = chatBox(); cb.scrollTop = cb.scrollHeight; }

    function removeWelcome() {
        const w = document.getElementById('welcomeScreen');
        if (w) w.remove();
    }

    function quickPrompt(text) {
        document.getElementById('promptInput').value = text;
        sendMessage();
    }

    function appendUser(text) {
        removeWelcome();
        const div = document.createElement('div');
        div.className = 'message user-message';
        div.innerHTML = `<div class="user-bubble">${escapeHTML(text)}</div>`;
        chatBox().appendChild(div);
        scrollBottom();
    }

    function appendThinking() {
        const div = document.createElement('div');
        div.className = 'message ai-message';
        div.innerHTML = `
            <div class="ai-row">
                <div class="ai-msg-avatar">🤖</div>
                <div class="ai-bubble-wrap" id="bubbleWrap">
                    <div class="thinking-bubble" id="thinkingBody">
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                </div>
            </div>`;
        chatBox().appendChild(div);
        scrollBottom();
        return div;
    }

    function finaliseReply(wrap, rawText, elapsedMs) {
        const formatted = formatReply(rawText);
        const seconds   = (elapsedMs / 1000).toFixed(1);

        const bubble = document.createElement('div');
        bubble.className = 'ai-bubble';
        const content = document.createElement('span');
        content.innerHTML = formatted;
        bubble.appendChild(content);

        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = 'Copy';
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(rawText).then(() => {
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = 'Copy';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        };

        const meta = document.createElement('div');
        meta.className = 'ai-meta';
        meta.innerHTML = `<span class="ai-time">⏱ ${seconds}s response time</span>`;
        meta.appendChild(copyBtn);

        wrap.innerHTML = '';
        wrap.appendChild(bubble);
        wrap.appendChild(meta);
        scrollBottom();
    }

    function appendError(msg) {
        removeWelcome();
        const div = document.createElement('div');
        div.className = 'message ai-message';
        div.innerHTML = `
            <div class="ai-row">
                <div class="ai-msg-avatar">🤖</div>
                <div class="ai-bubble-wrap">
                    <div class="error-bubble">${escapeHTML(msg)}</div>
                </div>
            </div>`;
        chatBox().appendChild(div);
        scrollBottom();
    }

    async function sendMessage() {
        const input  = document.getElementById('promptInput');
        const btn    = document.getElementById('sendBtn');
        const prompt = input.value.trim();
        if (!prompt) return;

        input.value  = '';
        btn.disabled = true;

        appendUser(prompt);
        const thinkingEl   = appendThinking();
        const bubbleWrap   = thinkingEl.querySelector('#bubbleWrap');
        const thinkingBody = thinkingEl.querySelector('#thinkingBody');

        // Replace dots with streaming bubble
        thinkingBody.className = 'ai-bubble typing-cursor';
        thinkingBody.removeAttribute('id');
        thinkingBody.innerHTML = '';
        const textNode = document.createElement('span');
        thinkingBody.appendChild(textNode);

        const startTime  = Date.now();
        let streamedText = '';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });

            const contentType = response.headers.get('content-type') || '';

            if (contentType.includes('text/event-stream')) {
                // SSE streaming
                const reader  = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer    = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const json = JSON.parse(line.slice(6));
                            if (json.error) throw new Error(json.error);
                            if (json.chunk) {
                                streamedText += json.chunk;
                                textNode.textContent = streamedText;
                                scrollBottom();
                            }
                            if (json.done) {
                                thinkingBody.classList.remove('typing-cursor');
                                finaliseReply(bubbleWrap, json.result || streamedText, Date.now() - startTime);
                            }
                        } catch (_) {}
                    }
                }

            } else {
                // Fallback: normal JSON + simulated typing
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                streamedText = data.result || '';

                let i = 0;
                await new Promise(resolve => {
                    function type() {
                        if (i < streamedText.length) {
                            textNode.textContent += streamedText[i++];
                            scrollBottom();
                            setTimeout(type, 8);
                        } else {
                            thinkingBody.classList.remove('typing-cursor');
                            finaliseReply(bubbleWrap, streamedText, Date.now() - startTime);
                            resolve();
                        }
                    }
                    type();
                });
            }

        } catch (err) {
            thinkingEl.remove();
            appendError(err.message || 'Connection failed. Please try again.');
        }

        btn.disabled = false;
        input.focus();
    }

    document.getElementById('promptInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
    });
</script>
</body>
</html>
